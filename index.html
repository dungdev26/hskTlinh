<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HSK Master - Full Audio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans SC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .tab-content { padding-bottom: 90px; }
        @media (min-width: 768px) { .tab-content { padding-bottom: 20px; } }
        .card-inner { transition: transform 0.5s; transform-style: preserve-3d; cursor: pointer; height: 100%; }
        .flipped { transform: rotateY(180deg); }
        .card-front, .card-back { backface-visibility: hidden; position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 1.25rem; }
        .card-back { transform: rotateY(180deg); background-color: #f0f9ff; border: 2px solid #3b82f6; }
        .card-front { background: white; border: 1px solid #e2e8f0; }
        #writing-pad { background: #fff; border: 2px solid #e2e8f0; border-radius: 15px; margin: 0 auto; touch-action: none; }
        .nav-item-active { color: #4f46e5 !important; font-weight: 800; }
        @media (max-width: 767px) { .nav-item-active { background: #f5f3ff; border-radius: 12px; } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <header class="bg-white border-b h-14 md:h-16 sticky top-0 z-40 px-4 flex items-center justify-between shadow-sm">
        <div class="flex items-center gap-2">
            <span class="text-2xl">🏮</span>
            <span class="font-black text-pink-500 tracking-tighter text-lg">HSK MASTER HỌC CÙNG TLINH</span>
        </div>
        </div>
        <nav class="hidden md:flex gap-6">
            <button onclick="switchTab('study')" id="pc-study" class="text-sm font-bold text-slate-500 py-5">HỌC TẬP</button>
            <button onclick="switchTab('write')" id="pc-write" class="text-sm font-bold text-slate-500 py-5">VIẾT TAY</button>
            <button onclick="switchTab('type')" id="pc-type" class="text-sm font-bold text-slate-500 py-5">GÕ PHÍM</button>
        </nav>
        <div id="stats" class="text-[10px] font-bold bg-indigo-50 text-indigo-600 px-3 py-1 rounded-full border border-indigo-100 uppercase">0 TỪ</div>
    </header>

    <main class="max-w-6xl mx-auto p-4 md:p-8">
        <div id="page-study" class="tab-content">
            <div class="bg-white p-4 md:p-6 rounded-3xl shadow-sm border border-slate-200 mb-6 flex flex-wrap gap-3">
                <input type="text" id="searchInput" placeholder="Tìm kiếm..." class="flex-1 min-w-[150px] p-3 rounded-xl bg-slate-50 outline-none focus:ring-2 focus:ring-indigo-500">
                <select id="levelFilter" class="p-3 rounded-xl bg-slate-50 outline-none text-sm font-bold">
                    <option value="all">TẤT CẢ HSK</option>
                    <option value="1">HSK 1</option>
                    <option value="2">HSK 2</option>
                </select>
                <button onclick="toggleMode()" id="modeBtn" class="bg-white border border-indigo-200 text-indigo-600 px-4 py-2 rounded-xl font-bold text-xs">🗂️ DANH SÁCH</button>
                <label class="bg-emerald-500 text-white px-4 py-2 rounded-xl font-bold text-xs cursor-pointer">
                    📥 EXCEL <input type="file" id="excelUpload" accept=".xlsx, .xls" class="hidden">
                </label>
            </div>
            <div id="vocabContainer" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
        </div>

        <div id="page-write" class="tab-content hidden flex flex-col items-center">
            <div class="w-full max-w-2xl bg-white p-6 md:p-10 rounded-3xl shadow-xl border border-slate-100 flex flex-col md:flex-row gap-8 items-center">
                <div class="flex-1 w-full text-center">
                    <div class="flex justify-between items-center mb-6">
                        <div class="text-left">
                            <h2 id="target-char-display" class="text-5xl font-black text-slate-800">爱</h2>
                            <p id="target-pinyin-display" class="text-indigo-500 font-bold text-xl">ài</p>
                        </div>
                        <button onclick="speak(currentWord)" class="bg-indigo-50 p-4 rounded-full text-2xl hover:scale-110 transition-transform">🔊</button>
                    </div>
                    <div id="writing-pad"></div>
                    <div class="grid grid-cols-3 gap-2 mt-6">
                        <button onclick="writer.animateCharacter()" class="bg-indigo-500 text-white p-3 rounded-xl font-bold text-xs">MẪU</button>
                        <button onclick="writer.quiz()" class="bg-orange-500 text-white p-3 rounded-xl font-bold text-xs">THỬ SỨC</button>
                        <button onclick="initWriter(currentWord, currentPinyin, currentMean)" class="bg-slate-100 text-slate-600 p-3 rounded-xl font-bold text-xs uppercase font-black">XÓA</button>
                    </div>
                </div>
                <div class="w-full md:w-48 bg-slate-50 p-4 rounded-2xl">
                    <p class="text-[10px] font-black text-slate-400 uppercase mb-4 text-center">DANH SÁCH</p>
                    <div id="write-list" class="flex md:flex-col gap-2 overflow-x-auto md:overflow-y-auto max-h-40 md:max-h-[300px]"></div>
                </div>
            </div>
        </div>

        <div id="page-type" class="tab-content hidden flex flex-col items-center">
            <div class="w-full max-w-xl bg-white p-10 rounded-3xl shadow-2xl text-center border border-slate-100">
                <p id="type-score" class="text-indigo-600 font-black text-xs uppercase mb-8 tracking-widest">ĐÚNG: 0</p>
                <h2 id="type-mean-display" class="text-3xl font-black text-slate-800 mb-10 italic">yêu, thích</h2>
                <div class="relative">
                    <input type="text" id="typeInput" autocomplete="off" placeholder="Gõ..." 
                        class="w-full p-5 text-center text-2xl rounded-2xl bg-slate-50 border-4 border-transparent focus:border-indigo-400 outline-none mb-4">
                    <button onclick="speak(vocabulary[typeIdx].char)" class="absolute right-4 top-5 text-xl opacity-30 hover:opacity-100">🔊</button>
                </div>
                <div id="feedback" class="h-6 font-bold text-indigo-500 mb-6"></div>
                <button onclick="showHint()" class="text-slate-300 text-xs font-bold uppercase tracking-widest">Xem gợi ý</button>
                <div id="hint-display" class="mt-6 text-5xl font-bold text-slate-100 hidden"></div>
            </div>
        </div>
    </main>

    <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around items-center h-20 z-50 shadow-lg rounded-t-[30px]">
        <button onclick="switchTab('study')" id="mobile-study" class="flex flex-col items-center flex-1 gap-1 text-slate-400 p-2">
            <span class="text-xl">📚</span><span class="text-[10px] font-bold">HỌC</span>
        </button>
        <button onclick="switchTab('write')" id="mobile-write" class="flex flex-col items-center flex-1 gap-1 text-slate-400 p-2">
            <span class="text-xl">✍️</span><span class="text-[10px] font-bold">VIẾT</span>
        </button>
        <button onclick="switchTab('type')" id="mobile-type" class="flex flex-col items-center flex-1 gap-1 text-slate-400 p-2">
            <span class="text-xl">⌨️</span><span class="text-[10px] font-bold">GÕ</span>
        </button>
    </nav>

    <script>
        let vocabulary = [
            { char: "爱", pinyin: "ài", mean: "yêu, thích", level: "1" },
            { char: "你好", pinyin: "nǐ hǎo", mean: "xin chào", level: "1" },
            { char: "谢谢", pinyin: "xièxie", mean: "cảm ơn", level: "1" }
        ];

        let isFlashcardMode = false, writer, currentWord = "爱", currentPinyin = "ài", currentMean = "yêu", typeIdx = 0, score = 0;

        // --- BẮT ĐẦU PHẦN ÂM THANH MỚI ---
        let isAudioUnlocked = false;
        let zhVoice = null;

        function loadVoices() {
            const voices = window.speechSynthesis.getVoices();
            zhVoice = voices.find(voice => voice.lang.includes('zh') || voice.lang.includes('cmn'));
        }

        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = loadVoices;
        }

        function unlockAudio() {
            if (isAudioUnlocked) return;
            const silentMsg = new SpeechSynthesisUtterance('');
            silentMsg.volume = 0;
            window.speechSynthesis.speak(silentMsg);
            isAudioUnlocked = true;
            
            document.removeEventListener('touchstart', unlockAudio);
            document.removeEventListener('click', unlockAudio);
        }

        document.addEventListener('touchstart', unlockAudio, { once: true });
        document.addEventListener('click', unlockAudio, { once: true });

        function speak(text) {
            if (!window.speechSynthesis) {
                console.warn("Trình duyệt không hỗ trợ Web Speech API");
                return;
            }
            
            window.speechSynthesis.cancel();

            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-CN';
            msg.rate = 0.8;
            
            if (zhVoice) {
                msg.voice = zhVoice;
            }

            msg.onerror = function(e) {
                console.error("Lỗi phát âm thanh:", e);
            };

            window.speechSynthesis.speak(msg);
        }
        // --- KẾT THÚC PHẦN ÂM THANH MỚI ---

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(`page-${tab}`).classList.remove('hidden');
            document.querySelectorAll('nav button, header nav button').forEach(b => b.classList.remove('nav-item-active'));
            document.getElementById(`pc-${tab}`)?.classList.add('nav-item-active');
            document.getElementById(`mobile-${tab}`)?.classList.add('nav-item-active');
            if(tab === 'write') { updateWriteList(); initWriter(currentWord, currentPinyin, currentMean); }
            if(tab === 'type') { startTypeGame(); }
            window.scrollTo(0,0);
        }

        function initWriter(char, pinyin, mean) {
            currentWord = char[0]; currentPinyin = pinyin; currentMean = mean;
            document.getElementById('target-char-display').innerText = currentWord;
            document.getElementById('target-pinyin-display').innerText = currentPinyin;
            document.getElementById('writing-pad').innerHTML = "";
            const size = window.innerWidth < 768 ? Math.min(window.innerWidth - 100, 280) : 300;
            writer = HanziWriter.create('writing-pad', currentWord, {
                width: size, height: size, showCharacter: false, padding: 20, strokeColor: '#4f46e5'
            });
        }

        function updateWriteList() {
            const list = document.getElementById('write-list'); list.innerHTML = '';
            vocabulary.forEach(word => {
                const btn = document.createElement('button');
                btn.innerText = word.char;
                btn.className = `flex-shrink-0 md:w-full p-3 rounded-xl border font-bold ${currentWord === word.char[0] ? 'bg-indigo-600 text-white' : 'bg-white'}`;
                btn.onclick = () => initWriter(word.char, word.pinyin, word.mean);
                list.appendChild(btn);
            });
        }

        function startTypeGame() { typeIdx = Math.floor(Math.random() * vocabulary.length); nextTypeWord(); }
        function nextTypeWord() {
            const word = vocabulary[typeIdx];
            document.getElementById('type-mean-display').innerText = word.mean;
            document.getElementById('typeInput').value = ""; document.getElementById('typeInput').focus();
            document.getElementById('feedback').innerText = ""; document.getElementById('hint-display').classList.add('hidden');
            document.getElementById('hint-display').innerText = word.char;
        }

        function showHint() { document.getElementById('hint-display').classList.toggle('hidden'); }

        document.getElementById('typeInput').addEventListener('input', function(e) {
            const val = e.target.value.trim().toLowerCase();
            const word = vocabulary[typeIdx];
            if (val === word.pinyin.replace(/\s/g, '').toLowerCase() || val === word.char) {
                document.getElementById('feedback').innerText = "CHÍNH XÁC! ✨";
                score++; document.getElementById('type-score').innerText = `ĐÚNG: ${score}`;
                speak(word.char);
                setTimeout(() => { typeIdx = (typeIdx + 1) % vocabulary.length; nextTypeWord(); }, 800);
            }
        });

        function render() {
            const container = document.getElementById('vocabContainer');
            const query = document.getElementById('searchInput').value.toLowerCase();
            const level = document.getElementById('levelFilter').value;
            const filtered = vocabulary.filter(v => (v.char.includes(query) || v.mean.includes(query)) && (level === 'all' || v.level === level));
            container.innerHTML = '';
            filtered.forEach(word => {
                const wrapper = document.createElement('div');
                wrapper.className = "h-40 md:h-48 perspective-1000";
                if (isFlashcardMode) {
                    wrapper.innerHTML = `<div class="card-inner" onclick="this.classList.toggle('flipped')">
                        <div class="card-front text-2xl md:text-4xl font-bold">${word.char}</div>
                        <div class="card-back p-4 text-center">
                            <button onclick="event.stopPropagation(); speak('${word.char}')" class="mb-2 text-xl">🔊</button><br>
                            <span class="text-indigo-600 font-bold text-xs">${word.pinyin}</span>
                        </div>
                    </div>`;
                } else {
                    wrapper.innerHTML = `<div class="bg-white p-4 rounded-3xl border border-slate-100 h-full flex flex-col justify-between shadow-sm relative group">
                        <button onclick="event.stopPropagation(); speak('${word.char}')" class="absolute top-2 right-2 opacity-0 group-hover:opacity-100 transition-opacity">🔊</button>
                        <div onclick="switchTab('write'); initWriter('${word.char}', '${word.pinyin}', '${word.mean}')">
                            <h3 class="text-xl md:text-3xl font-bold text-slate-800">${word.char}</h3>
                            <p class="text-indigo-500 text-[10px] md:text-sm font-bold">${word.pinyin}</p>
                            <p class="text-slate-400 text-[10px] md:text-xs truncate italic mt-2">${word.mean}</p>
                        </div>
                    </div>`;
                }
                container.appendChild(wrapper);
            });
            document.getElementById('stats').innerText = `${vocabulary.length} TỪ`;
        }

        document.getElementById('excelUpload').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                const imported = json.map(r => ({ char: r["Từ vựng"] || r["Hán tự"] || "", pinyin: r["Phiên âm"] || r["Pinyin"] || "", mean: r["Nghĩa tiếng Việt"] || r["Nghĩa"] || "", level: r["Cấp độ"] || "1" })).filter(i => i.char);
                vocabulary = [...vocabulary, ...imported]; render();
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        });

        function toggleMode() { isFlashcardMode = !isFlashcardMode; document.getElementById('modeBtn').innerText = isFlashcardMode ? "🃏 CHẾ ĐỘ: THẺ" : "🗂️ DANH SÁCH"; render(); }
        document.getElementById('searchInput').addEventListener('input', render);
        document.getElementById('levelFilter').addEventListener('change', render);
        
        switchTab('study');
        render();
    </script>
</body>
</html>
